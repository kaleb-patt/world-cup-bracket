<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 Bracket Challenge</title>
  <style>
    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --surface2: #1f2937;
      --accent: #16a34a;
      --accent-light: #22c55e;
      --gold: #f59e0b;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --border: #374151;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    header { background: var(--surface); border-bottom: 2px solid var(--accent); padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 1.15rem; font-weight: 700; }
    @media (max-width: 500px) { header h1 { font-size: 1rem; } }
    .badge { background: var(--accent); color: white; font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }

    /* ── NAV ── */
    nav { background: var(--surface); display: flex; border-bottom: 1px solid var(--border); padding: 0 16px; gap: 2px; overflow-x: auto; }
    nav button { background: none; border: none; color: var(--text-muted); padding: 11px 13px; font-size: 0.86rem; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap; }
    nav button.active { color: var(--accent-light); border-bottom-color: var(--accent); }
    nav button:hover:not(.active) { color: var(--text); }

    /* ── MAIN ── */
    main { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
    @media (max-width: 500px) { main { padding: 14px 10px; } }

    /* ── STANDINGS ── */
    .standings-wrap { overflow-x: auto; }
    .standings-table { width: 100%; border-collapse: collapse; min-width: 480px; }
    .standings-table th { text-align: left; padding: 9px 12px; font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; background: var(--surface); border-bottom: 1px solid var(--border); white-space: nowrap; }
    .standings-table td { padding: 11px 12px; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .standings-table tr:hover td { background: var(--surface2); }
    .rank-1 .rank-cell { color: var(--gold); font-weight: 700; font-size: 1rem; }
    .rank-2 .rank-cell { color: #c0c0c0; font-weight: 700; }
    .rank-3 .rank-cell { color: #cd7f32; font-weight: 700; }
    .total-score { font-weight: 700; font-size: 1rem; color: var(--accent-light); }
    .round-score { color: var(--text-muted); font-size: 0.84rem; text-align: center; }
    .champ-badge { display: inline-block; padding: 2px 7px; background: rgba(245,158,11,0.12); border: 1px solid var(--gold); border-radius: 4px; color: var(--gold); font-size: 0.7rem; font-weight: 600; white-space: nowrap; }

    /* ── BRACKET — DESKTOP (horizontal flow) ── */
    .bracket-outer { overflow-x: auto; padding-bottom: 8px; }
    .bracket-desktop { display: flex; gap: 6px; min-width: 860px; align-items: stretch; }
    .round-col { display: flex; flex-direction: column; flex: 1; min-width: 130px; }
    .round-col h3 { font-size: 0.68rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; text-align: center; }
    .round-matches { display: flex; flex-direction: column; justify-content: space-around; flex: 1; gap: 4px; }

    /* ── BRACKET — MOBILE (vertical stacked) ── */
    .bracket-mobile { display: none; }
    .mobile-round { margin-bottom: 20px; }
    .mobile-round-header { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; padding-bottom: 6px; margin-bottom: 8px; border-bottom: 1px solid var(--border); }
    .mobile-matches { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    @media (max-width: 420px) { .mobile-matches { grid-template-columns: 1fr; } }

    @media (max-width: 700px) {
      .bracket-desktop { display: none; }
      .bracket-mobile { display: block; }
    }

    /* ── MATCH CARD (shared) ── */
    .match-card { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
    .match-team { padding: 5px 9px; font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .match-team:last-child { border-bottom: none; }
    .match-team.winner { background: rgba(22,163,74,0.18); color: var(--accent-light); font-weight: 600; }
    .match-team.tbd { color: var(--text-muted); font-style: italic; }
    .match-label { font-size: 0.6rem; color: var(--text-muted); padding: 3px 9px; background: var(--surface2); border-bottom: 1px solid var(--border); line-height: 1.3; }

    /* 3rd place match special styling */
    .match-card.third-place { border-color: var(--gold); opacity: 0.85; }
    .match-card.third-place .match-label { color: var(--gold); }

    /* ── PICKS FORM ── */
    .picks-section { max-width: 680px; }
    .name-row { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .name-row label { font-weight: 600; white-space: nowrap; font-size: 0.9rem; }
    select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 9px 13px; border-radius: 6px; font-size: 0.88rem; min-width: 180px; }
    select:focus { outline: none; border-color: var(--accent); }
    .round-block { margin-bottom: 22px; }
    .round-block h3 { font-size: 0.73rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .pick-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .pick-row:last-child { border-bottom: none; }
    .match-num { font-size: 0.75rem; color: var(--text-muted); width: 18px; flex-shrink: 0; text-align: center; }
    .team-btn { flex: 1; padding: 8px 8px; background: var(--surface2); border: 2px solid transparent; border-radius: 6px; cursor: pointer; font-size: 0.8rem; text-align: center; color: var(--text); transition: all 0.12s; user-select: none; }
    .team-btn:hover:not(.tbd) { border-color: var(--accent); }
    .team-btn.selected { background: rgba(22,163,74,0.2); border-color: var(--accent); color: var(--accent-light); font-weight: 600; }
    .team-btn.tbd { color: var(--text-muted); cursor: default; opacity: 0.5; font-style: italic; }
    .vs { color: var(--text-muted); font-size: 0.7rem; flex-shrink: 0; }
    .deadline-info { font-size: 0.76rem; color: var(--text-muted); margin-top: 6px; }
    .deadline-passed { color: #f87171; font-size: 0.85rem; font-weight: 600; }

    /* ── PICKS VIEWER ── */
    .viewer-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .viewer-chip { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.12s; font-weight: 500; }
    .viewer-chip:hover { border-color: var(--accent); color: var(--accent-light); }
    .viewer-chip.active { background: rgba(22,163,74,0.2); border-color: var(--accent); color: var(--accent-light); font-weight: 700; }
    .viewer-rounds { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 16px; }
    .viewer-round-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 5px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.04em; transition: all 0.12s; }
    .viewer-round-btn:hover { border-color: var(--accent); color: var(--text); }
    .viewer-round-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
    .viewer-round-block { margin-bottom: 20px; }
    .viewer-round-title { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; padding-bottom: 6px; margin-bottom: 8px; border-bottom: 1px solid var(--border); }
    .viewer-matches { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; }
    .viewer-match-card { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
    .viewer-match-card.all-correct { border-color: rgba(22,163,74,0.5); }
    .viewer-match-card.has-wrong   { border-color: rgba(220,38,38,0.4); }
    .viewer-match-info { font-size: 0.58rem; color: var(--text-muted); padding: 3px 9px; background: var(--surface2); border-bottom: 1px solid var(--border); line-height: 1.35; }
    .viewer-team { display: flex; justify-content: space-between; align-items: center; padding: 5px 9px; font-size: 0.76rem; border-bottom: 1px solid var(--border); }
    .viewer-team:last-of-type { border-bottom: none; }
    .viewer-team.tbd-team { color: var(--text-muted); font-style: italic; }
    .viewer-team.st-pending  { background: rgba(59,130,246,0.1); color: #93c5fd; font-weight: 600; }
    .viewer-team.st-correct  { background: rgba(22,163,74,0.25); color: var(--accent-light); font-weight: 700; }
    .viewer-team.st-wrong    { background: rgba(220,38,38,0.12); color: #f87171; font-weight: 600; }
    .viewer-team.st-winner   { background: rgba(22,163,74,0.14); color: var(--accent-light); }
    .vi { font-size: 0.75rem; margin-left: 4px; flex-shrink: 0; }
    .vi.correct { color: var(--accent-light); }
    .vi.wrong   { color: #f87171; }
    .vi.pending { font-size: 0.65rem; opacity: 0.7; }
    .viewer-no-pick { font-size: 0.7rem; color: var(--text-muted); padding: 4px 9px; font-style: italic; }
    .viewer-sub-note { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 12px; }

    /* ── SHARED ── */
    .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 14px; }
    .btn:hover { background: var(--accent-light); }
    .btn-sm { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 6px 11px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }
    .btn-sm:hover { border-color: var(--accent); }
    .alert { padding: 10px 13px; border-radius: 6px; margin-bottom: 12px; font-size: 0.86rem; line-height: 1.4; }
    .alert-info { background: rgba(59,130,246,0.12); border: 1px solid #3b82f6; color: #93c5fd; }
    .alert-success { background: rgba(22,163,74,0.12); border: 1px solid var(--accent); color: var(--accent-light); }
    .alert-error { background: rgba(220,38,38,0.12); border: 1px solid #dc2626; color: #f87171; }
    .alert-warn { background: rgba(245,158,11,0.12); border: 1px solid var(--gold); color: #fcd34d; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .section-header h2 { font-size: 1rem; font-weight: 700; }
    .muted { color: var(--text-muted); font-size: 0.76rem; }
    .loading { text-align: center; padding: 48px; color: var(--text-muted); }
  </style>
</head>

<header>
  <span style="font-size:1.3rem">⚽</span>
  <h1>World Cup 2026 Bracket Challenge</h1>
  <span class="badge">Live</span>
</header>

<nav>
  <button class="active" onclick="showTab('standings')">🏆 Standings</button>
  <button onclick="showTab('bracket')">📊 Bracket</button>
  <button onclick="showTab('viewer')">👁 Browse Picks</button>
  <button onclick="showTab('picks')">✏️ Submit Picks</button>
</nav>

<main>
  <div id="tab-standings">
    <div class="section-header">
      <h2>Current Standings</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="muted" id="last-updated"></span>
        <button class="btn-sm" onclick="refreshData()">↻ Refresh</button>
      </div>
    </div>
    <div id="standings-content"><div class="loading">Loading standings…</div></div>
  </div>

  <div id="tab-bracket" style="display:none">
    <div class="section-header"><h2>Tournament Bracket</h2></div>
    <!-- Desktop: horizontal flow -->
    <div class="bracket-outer">
      <div class="bracket-desktop" id="bracket-desktop"></div>
    </div>
    <!-- Mobile: vertical stacked by round -->
    <div class="bracket-mobile" id="bracket-mobile"></div>
  </div>

  <div id="tab-viewer" style="display:none">
    <div class="section-header"><h2>Browse Everyone's Picks</h2></div>
    <div id="viewer-content"><div class="loading">Loading…</div></div>
  </div>

  <div id="tab-picks" style="display:none">
    <div class="section-header"><h2>Submit Your Picks</h2></div>
    <div class="picks-section" id="picks-content"><div class="loading">Loading…</div></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://jtsbdybyxjcsagzyqzgl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HMWBoSvqa8uZL8vDgKoYKA_yKN0B2zk';
let sb;

// ═══════════════════════════════════════════════════════════════
//  BRACKET STRUCTURE
// ═══════════════════════════════════════════════════════════════
const ROUND_ORDER    = ['R32','R16','QF','SF','F'];
const BRACKET_ROUNDS = ['R32','R16','QF','SF','F','3P'];
const ROUND_NAMES    = { R32:'Round of 32', R16:'Round of 16', QF:'Quarterfinals', SF:'Semifinals', F:'Final', '3P':'3rd Place' };

const FED_BY = {

  R16_M3:['R32_M5','R32_M6'], R16_M4:['R32_M7','R32_M8'],

const ROUND_DEADLINES = {

  R16: new Date('2026-07-04T13:00:00-04:00'),
  QF:  new Date('2026-07-09T16:00:00-04:00'),

// ═══════════════════════════════════════════════════════════════
//  MATCH INFO (venue + ET kickoff time)
// ═══════════════════════════════════════════════════════════════
const MATCH_INFO = {
  R32_M1:  { venue:'Gillette Stadium, Foxborough MA',           time:'Jun 29, 4:30 PM ET' },
  R32_M2:  { venue:'MetLife Stadium, East Rutherford NJ',       time:'Jun 30, 5:00 PM ET' },

  R32_M5:  { venue:'BMO Field, Toronto CA',                     time:'Jul 2, 7:00 PM ET' },
  R32_M6:  { venue:'SoFi Stadium, Inglewood CA',                time:'Jul 2, 3:00 PM ET' },
  R32_M7:  { venue:"Levi's Stadium, Santa Clara CA",            time:'Jul 1, 4:00 PM ET' },
  R32_M8:  { venue:'Lumen Field, Seattle WA',                   time:'Jul 1, 8:00 PM ET' },
  R32_M9:  { venue:'NRG Stadium, Houston TX',                   time:'Jun 29, 1:00 PM ET' },

  R32_M11: { venue:'Estadio Azteca, Mexico City MX',            time:'Jun 30, 9:00 PM ET' },
  R32_M12: { venue:'Mercedes-Benz Stadium, Atlanta GA',         time:'Jul 1, 12:00 PM ET' },
  R32_M13: { venue:'Hard Rock Stadium, Miami Gardens FL',       time:'Jul 3, 6:00 PM ET' },
  R32_M14: { venue:'AT&T Stadium, Arlington TX',                time:'Jul 3, 2:00 PM ET' },
  R32_M15: { venue:'BC Place, Vancouver CA',                    time:'Jul 2, 11:00 PM ET' },
  R32_M16: { venue:'Arrowhead Stadium, Kansas City MO',         time:'Jul 3, 9:30 PM ET' },

  R16_M6:  { venue:'Estadio Azteca, Mexico City MX',            time:'Jul 5, 8:00 PM ET' },
  R16_M7:  { venue:'BC Place, Vancouver CA',                    time:'Jul 7, 4:00 PM ET' },
  R16_M8:  { venue:'Mercedes-Benz Stadium, Atlanta GA',         time:'Jul 6, 12:00 PM ET' },
  QF_M1:   { venue:'Gillette Stadium, Foxborough MA',           time:'Jul 9, 4:00 PM ET' },
  QF_M2:   { venue:'SoFi Stadium, Los Angeles CA',              time:'Jul 10, 3:00 PM ET' },
  QF_M3:   { venue:'Hard Rock Stadium, Miami Gardens FL',       time:'Jul 11, 5:00 PM ET' },
  QF_M4:   { venue:'Arrowhead Stadium, Kansas City MO',         time:'Jul 11, 9:00 PM ET' },
  SF_M1:   { venue:'AT&T Stadium, Dallas TX',                   time:'Jul 14, 3:00 PM ET' },
  SF_M2:   { venue:'Mercedes-Benz Stadium, Atlanta GA',         time:'Jul 15, 3:00 PM ET' },
  '3P_M1': { venue:'Hard Rock Stadium, Miami Gardens FL',       time:'Jul 18, 5:00 PM ET' },
  F_M1:    { venue:'MetLife Stadium, East Rutherford NJ',       time:'Jul 19, 3:00 PM ET' },
};

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let matches = [], submissions = [], participants = [];
let currentPicks = {};
let selectedName = '';
let activeTab = 'standings';
let viewerName = '';
let viewerRound = '';

// ═══════════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════════
async function loadData() {
  const [mRes, sRes, pRes] = await Promise.all([
    sb.from('matches').select('*').order('round').order('match_number'),
    sb.from('submissions').select('*').order('submitted_at', { ascending: true }),
    sb.from('participants').select('*').order('name'),
  ]);
  if (mRes.error) console.error('matches:', mRes.error);
  if (sRes.error) console.error('submissions:', sRes.error);
  if (pRes.error) console.error('participants:', pRes.error);
  matches      = mRes.data || [];
  submissions  = sRes.data || [];
  participants = pRes.data || [];
  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleTimeString();
}

async function refreshData() {
  await loadData();
  renderActiveTab();
}

// ═══════════════════════════════════════════════════════════════
//  SCORING
// ═══════════════════════════════════════════════════════════════
function calculateScores() {
  const scores = {};
  participants.forEach(p => {
    scores[p.name] = { total: 0, byRound: { R32:0, R16:0, QF:0, SF:0, F:0 } };
  });
  const completed = matches.filter(m => m.winner && ROUND_ORDER.includes(m.round));
  completed.forEach(match => {
    submissions.forEach(sub => {
      if (sub.picks[match.id] === match.winner) {
        if (!scores[sub.participant_name]) {
          scores[sub.participant_name] = { total:0, byRound:{ R32:0,R16:0,QF:0,SF:0,F:0 } };
        }
        scores[sub.participant_name].total++;
        scores[sub.participant_name].byRound[match.round]++;
      }
    });
  });
  return scores;
}

// ═══════════════════════════════════════════════════════════════
//  TAB NAV
// ═══════════════════════════════════════════════════════════════
function showTab(tab) {
  activeTab = tab;
  const tabs = ['standings','bracket','viewer','picks'];
  document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('active', tabs[i] === tab));
  tabs.forEach(t => { document.getElementById('tab-'+t).style.display = t === tab ? '' : 'none'; });
  renderActiveTab();
}
function renderActiveTab() {
  if (activeTab === 'standings') renderStandings();
  else if (activeTab === 'bracket') renderBracket();
  else if (activeTab === 'viewer') renderViewer();
  else if (activeTab === 'picks') renderPicks();
}

// ═══════════════════════════════════════════════════════════════
//  STANDINGS
// ═══════════════════════════════════════════════════════════════
function renderStandings() {
  const scores = calculateScores();
  const sorted = Object.entries(scores).sort((a,b) => b[1].total - a[1].total);

  const champPicks = {};
  submissions.forEach(sub => { if (sub.picks['F_M1']) champPicks[sub.participant_name] = sub.picks['F_M1']; });

  const activeCols = ROUND_ORDER.filter(r => matches.filter(m => m.round===r).some(m => m.winner));

  if (sorted.every(([,s]) => s.total === 0) && activeCols.length === 0) {
    document.getElementById('standings-content').innerHTML =
      '<div class="alert alert-info">No results recorded yet. Scores will appear once matches complete.</div>';
    return;
  }

  let rank = 1;
  const rows = sorted.map(([name, score], i) => {
    if (i > 0 && sorted[i-1][1].total > score.total) rank = i + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const roundCells = activeCols.map(r =>
      `<td class="round-score" style="text-align:center">${score.byRound[r] || 0}</td>`
    ).join('');
    const champ = champPicks[name] ? `<span class="champ-badge">🏆 ${champPicks[name]}</span>` : '—';
    return `<tr class="${rankClass}">
      <td class="rank-cell" style="width:32px;font-weight:700">${rank}</td>
      <td><strong>${name}</strong></td>
      <td class="total-score">${score.total}</td>
      ${roundCells}
      <td>${champ}</td>
    </tr>`;
  }).join('');

  const headCols = activeCols.map(r => `<th style="text-align:center">${ROUND_NAMES[r]}</th>`).join('');
  document.getElementById('standings-content').innerHTML = `
    <div class="standings-wrap">
    <table class="standings-table">
      <thead><tr>
        <th>#</th><th>Name</th><th>Total</th>${headCols}<th>Champion Pick</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  BRACKET
// ═══════════════════════════════════════════════════════════════
function bracketTeams(matchId) {
  const mm = {};
  matches.forEach(m => mm[m.id] = m);
  const m = mm[matchId];
  if (!m) return ['TBD','TBD'];
  if (m.team1 && m.team2) return [m.team1, m.team2];
  const feeders = FED_BY[matchId];
  if (!feeders) return ['TBD','TBD'];
  return [mm[feeders[0]]?.winner || 'TBD', mm[feeders[1]]?.winner || 'TBD'];
}

function matchCardHtml(m, extraClass = '') {
  const [t1, t2] = bracketTeams(m.id);
  const w = m.winner;
  const is3P = m.round === '3P';
  const info = MATCH_INFO[m.id];
  const infoHtml = info ? `<div class="match-label">${info.time} · ${info.venue}</div>` : '';
  return `<div class="match-card ${is3P ? 'third-place' : ''} ${extraClass}">
    ${is3P ? '<div class="match-label" style="color:var(--gold)">3rd Place</div>' : ''}
    ${infoHtml}
    <div class="match-team ${w===t1?'winner':''} ${t1==='TBD'?'tbd':''}">${t1}${w===t1?' ✓':''}</div>
    <div class="match-team ${w===t2?'winner':''} ${t2==='TBD'?'tbd':''}">${t2}${w===t2?' ✓':''}</div>
  </div>`;
}

function renderBracket() {
  // ── Desktop ──
  let desktopHtml = '';
  BRACKET_ROUNDS.forEach(round => {
    const rMatches = matches.filter(m => m.round === round).sort((a,b) => a.match_number - b.match_number);
    if (!rMatches.length) return;
    desktopHtml += `<div class="round-col"><h3>${ROUND_NAMES[round]}</h3><div class="round-matches">`;
    rMatches.forEach(m => { desktopHtml += matchCardHtml(m); });
    desktopHtml += '</div></div>';
  });
  document.getElementById('bracket-desktop').innerHTML = desktopHtml;

  // ── Mobile ──
  let mobileHtml = '';
  BRACKET_ROUNDS.forEach(round => {
    const rMatches = matches.filter(m => m.round === round).sort((a,b) => a.match_number - b.match_number);
    if (!rMatches.length) return;
    mobileHtml += `<div class="mobile-round">
      <div class="mobile-round-header">${ROUND_NAMES[round]}</div>
      <div class="mobile-matches">`;
    rMatches.forEach(m => { mobileHtml += matchCardHtml(m); });
    mobileHtml += '</div></div>';
  });
  document.getElementById('bracket-mobile').innerHTML = mobileHtml;
}

// ═══════════════════════════════════════════════════════════════
//  PICKS VIEWER
// ═══════════════════════════════════════════════════════════════
function selectViewerName(name) {
  viewerName = name;
  viewerRound = '';
  renderViewer();
}

function selectViewerRound(round) {
  viewerRound = round;
  renderViewer();
}

function renderViewer() {
  const el = document.getElementById('viewer-content');

  // Participant chips
  let html = '<div class="viewer-chips">';
  participants.forEach(p => {
    const safe = p.name.replace(/'/g, "\\'");
    html += `<button class="viewer-chip ${viewerName===p.name?'active':''}" onclick="selectViewerName('${safe}')">${p.name}</button>`;
  });
  html += '</div>';

  if (!viewerName) {
    html += '<div class="alert alert-info">Select a participant above to see their bracket picks.</div>';
    el.innerHTML = html;
    return;
  }

  const personSubs = submissions.filter(s => s.participant_name === viewerName);
  const submittedRounds = ROUND_ORDER.filter(r => personSubs.find(s => s.submission_round === r));

  if (!submittedRounds.length) {
    html += `<div class="alert alert-warn" style="margin-top:4px">${viewerName} hasn't submitted any picks yet.</div>`;
    el.innerHTML = html;
    return;
  }

  // Auto-select first round if none or invalid
  if (!viewerRound || !submittedRounds.includes(viewerRound)) {
    viewerRound = submittedRounds[0];
  }

  // Round pills — one per submission round the person has
  html += '<div class="viewer-rounds">';
  submittedRounds.forEach(r => {
    const safe = r.replace(/'/g, "\\'");
    html += `<button class="viewer-round-btn ${viewerRound===r?'active':''}" onclick="selectViewerRound('${safe}')">${ROUND_NAMES[r]} bracket</button>`;
  });
  html += '</div>';

  const sub = personSubs.find(s => s.submission_round === viewerRound);
  if (!sub) {
    html += '<div class="alert alert-warn">No submission found.</div>';
    el.innerHTML = html;
    return;
  }

  // Sub note
  const subDate = sub.submitted_at ? new Date(sub.submitted_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
  html += `<p class="viewer-sub-note">Submitted ${subDate} — picks for ${ROUND_NAMES[viewerRound]} through the Final</p>`;

  // Show all rounds contained in this submission
  const roundsInSub = ROUND_ORDER.slice(ROUND_ORDER.indexOf(viewerRound));

  roundsInSub.forEach(round => {
    const rMatches = matches.filter(m => m.round === round).sort((a,b) => a.match_number - b.match_number);
    if (!rMatches.length) return;

    html += `<div class="viewer-round-block"><div class="viewer-round-title">${ROUND_NAMES[round]}</div><div class="viewer-matches">`;

    rMatches.forEach(m => {
      const [t1, t2] = bracketTeams(m.id);
      const pick   = sub.picks[m.id];
      const winner = m.winner;
      const info   = MATCH_INFO[m.id];

      // Card border state: correct / has-wrong / neutral
      let cardState = '';
      if (pick && winner) cardState = pick === winner ? 'all-correct' : 'has-wrong';

      html += `<div class="viewer-match-card ${cardState}">`;
      if (info) html += `<div class="viewer-match-info">${info.time} · ${info.venue}</div>`;

      if (!pick) {
        // No pick recorded for this match
        const noPickRow = (team) => {
          const isTBD = team === 'TBD';
          const isW   = winner === team;
          let cls = 'viewer-team';
          if (isTBD) cls += ' tbd-team';
          if (isW)   cls += ' st-winner';
          return `<div class="${cls}"><span>${team}</span>${isW ? '<span class="vi correct">✓</span>' : ''}</div>`;
        };
        html += noPickRow(t1) + noPickRow(t2);
        html += `<div class="viewer-no-pick">No pick recorded</div>`;
      } else {
        [t1, t2].forEach(team => {
          const isPick  = pick === team;
          const isWin   = !!winner && winner === team;
          const isTBD   = team === 'TBD';

          let cls = 'viewer-team';
          if (isTBD) cls += ' tbd-team';

          let indicator = '';
          if (!isTBD && isPick) {
            if (winner) {
              if (isWin) {
                cls += ' st-correct';
                indicator = '<span class="vi correct">✓</span>';
              } else {
                cls += ' st-wrong';
                indicator = '<span class="vi wrong">✗</span>';
              }
            } else {
              cls += ' st-pending';
              indicator = '<span class="vi pending">⏳</span>';
            }
          } else if (isWin && !isPick) {
            cls += ' st-winner';
            indicator = '<span class="vi correct" style="opacity:0.5">✓</span>';
          }

          html += `<div class="${cls}"><span>${team}</span>${indicator}</div>`;
        });
      }

      html += '</div>';
    });

    html += '</div></div>';
  });

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
//  PICKS FORM
// ═══════════════════════════════════════════════════════════════
function getSubmittableRound() {
  for (const round of ROUND_ORDER) {
    const rMatches = matches.filter(m => m.round === round);
    if (rMatches.length > 0 && rMatches.every(m => m.status !== 'completed')) return round;
  }
  return null;
}

function isDeadlinePassed(round) {
  if (!round) return true;
  const d = ROUND_DEADLINES[round];
  return d ? new Date() >= d : false;
}

function pickMatchTeams(matchId) {
  const mm = {};
  matches.forEach(m => mm[m.id] = m);
  const m = mm[matchId];
  if (!m) return ['TBD','TBD'];
  if (m.team1 && m.team2) return [m.team1, m.team2];
  const feeders = FED_BY[matchId];
  if (!feeders) return ['TBD','TBD'];
  function resolve(fid) {
    const fm = mm[fid];
    if (fm?.winner) return fm.winner;
    return currentPicks[fid] || 'TBD';
  }
  return [resolve(feeders[0]), resolve(feeders[1])];
}

function renderPicks() {
  const submittableRound = getSubmittableRound();
  const deadlinePassed   = isDeadlinePassed(submittableRound);
  const nameOpts = participants.map(p =>
    `<option value="${p.name}"${p.name===selectedName?' selected':''}>${p.name}</option>`
  ).join('');

  let html = `<div class="name-row">
    <label>Your name:</label>
    <select id="pick-name" onchange="onNameChange(this.value)">
      <option value="">— Select your name —</option>${nameOpts}
    </select>
  </div>`;

  if (!submittableRound) {
    html += '<div class="alert alert-info">The tournament is complete. No more picks to submit.</div>';
    document.getElementById('picks-content').innerHTML = html;
    return;
  }
  if (!selectedName) {
    html += '<div class="alert alert-info">Select your name above to see the pick form.</div>';
    document.getElementById('picks-content').innerHTML = html;
    return;
  }

  const existing = submissions.find(s => s.participant_name === selectedName && s.submission_round === submittableRound);
  if (existing) Object.assign(currentPicks, existing.picks);

  if (deadlinePassed) {
    html += `<div class="alert alert-warn">⏰ <strong>${ROUND_NAMES[submittableRound]}</strong> picks are locked — window closed at first kickoff.${existing ? ' Your picks are shown below (read-only).' : ' You did not submit picks for this round.'}</div>`;
  } else {
    const d = ROUND_DEADLINES[submittableRound];
    const dStr = d ? d.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'}) : '';
    html += `<div class="alert alert-info">Picking for: <strong>${ROUND_NAMES[submittableRound]}</strong> through the Final.${existing?' You already submitted — update anytime before deadline.':''}${dStr?`<div class="deadline-info">⏰ Deadline: ${dStr}</div>`:''}
    </div>`;
  }

  const roundsToShow = ROUND_ORDER.slice(ROUND_ORDER.indexOf(submittableRound));
  roundsToShow.forEach(round => {
    const rMatches = matches.filter(m => m.round === round).sort((a,b) => a.match_number - b.match_number);
    html += `<div class="round-block" id="rb-${round}"><h3>${ROUND_NAMES[round]}</h3>`;
    rMatches.forEach(m => {
      const [t1,t2] = pickMatchTeams(m.id);
      const picked = currentPicks[m.id];
      const tbd = t1==='TBD' || t2==='TBD';
      html += `<div class="pick-row" id="pr-${m.id}">
        <span class="match-num">${m.match_number}</span>
        <div class="team-btn ${!tbd&&picked===t1?'selected':''} ${tbd?'tbd':''}" id="tb-${m.id}-0">${t1}</div>
        <span class="vs">vs</span>
        <div class="team-btn ${!tbd&&picked===t2?'selected':''} ${tbd?'tbd':''}" id="tb-${m.id}-1">${t2}</div>
      </div>`;
    });
    html += '</div>';
  });

  html += `<div id="pick-alert"></div>`;
  if (!deadlinePassed) {
    html += `<button class="btn" onclick="submitPicks('${submittableRound}')">${existing?'Update Picks':'Submit Picks'}</button>`;
  } else {
    html += `<p class="deadline-passed" style="margin-top:14px">🔒 Submission window closed</p>`;
  }

  document.getElementById('picks-content').innerHTML = html;

  if (!deadlinePassed) {
    roundsToShow.forEach(round => {
      matches.filter(m => m.round === round).sort((a,b) => a.match_number - b.match_number).forEach(m => {
        const [t1,t2] = pickMatchTeams(m.id);
        if (t1 !== 'TBD' && t2 !== 'TBD') {
          document.getElementById(`tb-${m.id}-0`)?.addEventListener('click', () => pickTeam(m.id, t1));
          document.getElementById(`tb-${m.id}-1`)?.addEventListener('click', () => pickTeam(m.id, t2));
        }
      });
    });
  }
}

function onNameChange(name) {
  selectedName = name;
  currentPicks = {};
  renderPicks();
}

function pickTeam(matchId, team) {
  currentPicks[matchId] = team;
  const [t1,t2] = pickMatchTeams(matchId);
  const el0 = document.getElementById(`tb-${matchId}-0`);
  const el1 = document.getElementById(`tb-${matchId}-1`);
  if (el0) el0.classList.toggle('selected', team === t1);
  if (el1) el1.classList.toggle('selected', team === t2);

  const submittableRound = getSubmittableRound();
  if (!submittableRound) return;
  const allRounds   = ROUND_ORDER.slice(ROUND_ORDER.indexOf(submittableRound));
  const matchRoundI = ROUND_ORDER.indexOf(matches.find(m=>m.id===matchId)?.round);
  allRounds.filter(r => ROUND_ORDER.indexOf(r) > matchRoundI).forEach(round => {
    matches.filter(m => m.round === round).sort((a,b) => a.match_number - b.match_number).forEach(m => {
      const [nt1,nt2] = pickMatchTeams(m.id);
      const tbd = nt1==='TBD' || nt2==='TBD';
      const cur = currentPicks[m.id];
      if (cur && cur !== nt1 && cur !== nt2) delete currentPicks[m.id];
      const e0 = document.getElementById(`tb-${m.id}-0`);
      const e1 = document.getElementById(`tb-${m.id}-1`);
      if (e0) { e0.textContent = nt1; e0.className = `team-btn ${currentPicks[m.id]===nt1?'selected':''} ${tbd?'tbd':''}`; e0.onclick = tbd ? null : () => pickTeam(m.id, nt1); }
      if (e1) { e1.textContent = nt2; e1.className = `team-btn ${currentPicks[m.id]===nt2?'selected':''} ${tbd?'tbd':''}`; e1.onclick = tbd ? null : () => pickTeam(m.id, nt2); }
    });
  });
}

async function submitPicks(round) {
  const alertEl = document.getElementById('pick-alert');
  if (!round) { alertEl.innerHTML = `<div class="alert alert-error">No active round.</div>`; return; }
  if (isDeadlinePassed(round)) { alertEl.innerHTML = `<div class="alert alert-error">Submission deadline has passed.</div>`; return; }

  const roundsToSubmit = ROUND_ORDER.slice(ROUND_ORDER.indexOf(round));
  let missing = 0;
  roundsToSubmit.forEach(r => {
    matches.filter(m => m.round === r).forEach(m => {
      const [t1,t2] = pickMatchTeams(m.id);
      if (t1 !== 'TBD' && t2 !== 'TBD' && !currentPicks[m.id]) missing++;
    });
  });
  if (missing > 0) {
    alertEl.innerHTML = `<div class="alert alert-error">Pick a winner for all ${missing} remaining match${missing>1?'es':''}.</div>`;
    return;
  }

  const filteredPicks = {};
  roundsToSubmit.forEach(r => {
    matches.filter(m => m.round === r).forEach(m => {
      if (currentPicks[m.id]) filteredPicks[m.id] = currentPicks[m.id];
    });
  });

  const { error } = await sb.from('submissions').upsert(
    { participant_name: selectedName, submission_round: round, picks: filteredPicks },
    { onConflict: 'participant_name,submission_round' }
  );
  if (error) {
    alertEl.innerHTML = `<div class="alert alert-error">Error saving: ${error.message}</div>`;
  } else {
    alertEl.innerHTML = `<div class="alert alert-success">✓ Picks saved for ${selectedName}!</div>`;
    await loadData();
  }
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
(async () => {
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  } catch(e) {
    document.getElementById('standings-content').innerHTML =
      `<div class="alert alert-error">Could not connect: ${e.message}. Check your connection and reload.</div>`;
    return;
  }
  await loadData();
  renderStandings();
})();
</script>
